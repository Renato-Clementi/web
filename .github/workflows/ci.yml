name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save free-tier minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: install · format · lint · build · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  db:
    name: db · migrate · smoke (Postgres + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baboo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Admin/owner connection: allowed to CREATE EXTENSION and own the schema.
      ADMIN_DATABASE_URL: postgres://postgres:postgres@localhost:5432/baboo_test
      # Ordinary application role: subject to RLS, so the smoke test's tenant
      # isolation assertion is actually enforced.
      APP_DATABASE_URL: postgres://app_user:app_pw@localhost:5432/baboo_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (admin role)
        run: DATABASE_URL="$ADMIN_DATABASE_URL" npm run db:migrate

      - name: Create non-privileged application role
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d baboo_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE app_user LOGIN PASSWORD 'app_pw';
          GRANT USAGE ON SCHEMA public TO app_user;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
          SQL

      - name: Smoke test (application role — RLS enforced)
        run: DATABASE_URL="$APP_DATABASE_URL" npm run db:smoke

      # BAB-17 acceptance: ingest sample docs + tickets CSV → embedded chunks →
      # relevant retrieval with source refs. Runs as the non-privileged app_user
      # so kb-smoke's tenant-isolation assertion is real. No VOYAGE_API_KEY in
      # CI, so it uses the deterministic hashing embedding provider.
      - name: KB ingestion smoke test (application role — RLS enforced)
        run: DATABASE_URL="$APP_DATABASE_URL" npx tsx db/kb-smoke.ts

  mcp-odoo:
    name: mcp-odoo · install · typecheck · build · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-odoo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: mcp-odoo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
